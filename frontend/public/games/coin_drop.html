<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Drop - BidBlitz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eab308, #78350f);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
            overflow: hidden;
        }
        h1 { font-size: 28px; margin-bottom: 10px; }
        .score-bar {
            display: flex;
            gap: 30px;
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .score-item { text-align: center; }
        .score-value { font-size: 28px; font-weight: bold; }
        .score-label { font-size: 12px; opacity: 0.8; }
        #game-container {
            position: relative;
            width: 350px;
            height: 500px;
            background: linear-gradient(180deg, #1a1a2e, #16213e);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .peg {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fbbf24;
            border-radius: 50%;
            box-shadow: 0 0 10px #fbbf24;
        }
        .coin {
            position: absolute;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 50%;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.5);
            z-index: 10;
            transition: none;
        }
        .bucket {
            position: absolute;
            bottom: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            border-top: 3px solid rgba(255,255,255,0.3);
        }
        .bucket-1 { left: 0; width: 70px; background: rgba(239,68,68,0.3); }
        .bucket-2 { left: 70px; width: 70px; background: rgba(251,191,36,0.3); }
        .bucket-3 { left: 140px; width: 70px; background: rgba(34,197,94,0.3); }
        .bucket-4 { left: 210px; width: 70px; background: rgba(251,191,36,0.3); }
        .bucket-5 { left: 280px; width: 70px; background: rgba(239,68,68,0.3); }
        .drop-zone {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 2px dashed rgba(255,255,255,0.3);
        }
        .drop-zone:hover { background: rgba(255,255,255,0.2); }
        .btn {
            margin-top: 20px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #78350f;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .result {
            margin-top: 15px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🪙 Coin Drop</h1>
    
    <div class="score-bar">
        <div class="score-item">
            <div class="score-value" id="coins">5</div>
            <div class="score-label">Münzen</div>
        </div>
        <div class="score-item">
            <div class="score-value" id="total">0</div>
            <div class="score-label">Gewonnen</div>
        </div>
    </div>
    
    <div id="game-container">
        <div class="drop-zone" onclick="dropCoin(event)">👆 Tippe zum Werfen</div>
        <div class="bucket bucket-1">5</div>
        <div class="bucket bucket-2">20</div>
        <div class="bucket bucket-3">50</div>
        <div class="bucket bucket-4">20</div>
        <div class="bucket bucket-5">5</div>
    </div>
    
    <div class="result" id="result"></div>
    <button class="btn" onclick="reset()">Neu starten</button>

    <script>
        const container = document.getElementById('game-container');
        const bucketValues = [5, 20, 50, 20, 5];
        let coinsLeft = 5;
        let totalWon = 0;
        
        // Create pegs
        const rows = 8;
        const pegsPerRow = 7;
        for (let row = 0; row < rows; row++) {
            const offset = row % 2 === 0 ? 25 : 50;
            for (let col = 0; col < pegsPerRow - (row % 2); col++) {
                const peg = document.createElement('div');
                peg.className = 'peg';
                peg.style.left = (offset + col * 50) + 'px';
                peg.style.top = (80 + row * 50) + 'px';
                container.appendChild(peg);
            }
        }
        
        function dropCoin(e) {
            if (coinsLeft <= 0) return;
            
            const rect = container.getBoundingClientRect();
            let startX = e.clientX - rect.left - 15;
            startX = Math.max(20, Math.min(310, startX));
            
            coinsLeft--;
            document.getElementById('coins').textContent = coinsLeft;
            
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.textContent = '🪙';
            coin.style.left = startX + 'px';
            coin.style.top = '20px';
            container.appendChild(coin);
            
            // Animate fall
            let x = startX;
            let y = 20;
            let vx = 0;
            let vy = 0;
            const gravity = 0.3;
            const bounce = 0.6;
            
            function animate() {
                vy += gravity;
                x += vx;
                y += vy;
                
                // Check peg collisions
                const pegs = document.querySelectorAll('.peg');
                pegs.forEach(peg => {
                    const pegX = parseFloat(peg.style.left) + 6;
                    const pegY = parseFloat(peg.style.top) + 6;
                    const dx = (x + 15) - pegX;
                    const dy = (y + 15) - pegY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist < 21) {
                        // Bounce off peg
                        const angle = Math.atan2(dy, dx);
                        vx = Math.cos(angle) * 3 * (Math.random() + 0.5);
                        vy = Math.abs(vy) * -bounce;
                        x += Math.cos(angle) * 5;
                        y += Math.sin(angle) * 5;
                    }
                });
                
                // Wall bounce
                if (x < 0) { x = 0; vx = Math.abs(vx) * bounce; }
                if (x > 320) { x = 320; vx = -Math.abs(vx) * bounce; }
                
                coin.style.left = x + 'px';
                coin.style.top = y + 'px';
                
                // Check if reached bucket
                if (y > 425) {
                    const bucketIndex = Math.floor((x + 15) / 70);
                    const safeIndex = Math.max(0, Math.min(4, bucketIndex));
                    const won = bucketValues[safeIndex];
                    totalWon += won;
                    document.getElementById('total').textContent = totalWon;
                    document.getElementById('result').textContent = `+${won} Coins!`;
                    
                    setTimeout(() => coin.remove(), 500);
                    
                    if (coinsLeft <= 0) {
                        setTimeout(() => {
                            document.getElementById('result').textContent = `Gesamt: ${totalWon} Coins gewonnen!`;
                        }, 1000);
                    }
                    return;
                }
                
                requestAnimationFrame(animate);
            }
            
            animate();
        }
        
        function reset() {
            coinsLeft = 5;
            totalWon = 0;
            document.getElementById('coins').textContent = '5';
            document.getElementById('total').textContent = '0';
            document.getElementById('result').textContent = '';
            document.querySelectorAll('.coin').forEach(c => c.remove());
        }
    </script>
</body>
</html>
