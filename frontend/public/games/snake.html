<!DOCTYPE html>
<html>
<head>
<title>BidBlitz Snake</title>
<style>
body{margin:0;background:#1e1b4b;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:Arial;color:#fff}
canvas{border:2px solid #7c3aed;border-radius:10px;background:#0f0a1e}
#score{margin:15px 0;font-size:18px}
p{opacity:0.7}
</style>
</head>
<body>
<h1>🐍 Snake</h1>
<div id="score">Score: 0</div>
<canvas id="game" width="400" height="400"></canvas>
<p>Arrow keys to move</p>
<script>
let canvas=document.getElementById("game"),ctx=canvas.getContext("2d")
let size=20,snake=[{x:200,y:200}],dir={x:0,y:0},food={x:100,y:100},score=0

function draw(){
ctx.fillStyle="#0f0a1e"
ctx.fillRect(0,0,400,400)

ctx.fillStyle="#22c55e"
snake.forEach(s=>ctx.fillRect(s.x,s.y,size-2,size-2))

ctx.fillStyle="#ef4444"
ctx.fillRect(food.x,food.y,size-2,size-2)
}

function update(){
let head={x:snake[0].x+dir.x,y:snake[0].y+dir.y}

if(head.x<0)head.x=380
if(head.x>=400)head.x=0
if(head.y<0)head.y=380
if(head.y>=400)head.y=0

snake.unshift(head)

if(head.x===food.x&&head.y===food.y){
score+=10
document.getElementById("score").innerText="Score: "+score
food={x:Math.floor(Math.random()*20)*20,y:Math.floor(Math.random()*20)*20}
}else{
snake.pop()
}

if(snake.slice(1).some(s=>s.x===head.x&&s.y===head.y)){
alert("Game Over! Score: "+score)
snake=[{x:200,y:200}]
dir={x:0,y:0}
score=0
document.getElementById("score").innerText="Score: 0"
}
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp"&&dir.y===0)dir={x:0,y:-20}
if(e.key==="ArrowDown"&&dir.y===0)dir={x:0,y:20}
if(e.key==="ArrowLeft"&&dir.x===0)dir={x:-20,y:0}
if(e.key==="ArrowRight"&&dir.x===0)dir={x:20,y:0}
})

setInterval(()=>{update();draw()},100)
</script>
</body>
</html>
