<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Target Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #1e3a5f, #0f172a);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      padding: 20px;
    }
    h1 { margin-bottom: 10px; }
    .stats {
      display: flex;
      gap: 30px;
      margin-bottom: 15px;
      font-size: 18px;
    }
    .stats span { color: #f59e0b; font-weight: bold; }
    #arena {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, #1f2937 0%, #111827 100%);
      border: 3px solid #6366f1;
      border-radius: 15px;
      position: relative;
      cursor: crosshair;
      overflow: hidden;
    }
    .target {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s;
      animation: pulse 0.5s infinite alternate;
    }
    .target:hover { transform: scale(1.1); }
    @keyframes pulse {
      from { box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
      to { box-shadow: 0 0 20px rgba(239, 68, 68, 0.8); }
    }
    .hit {
      animation: explode 0.3s forwards;
    }
    @keyframes explode {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(2); opacity: 0; }
    }
    #timer-bar {
      width: 350px;
      height: 10px;
      background: #374151;
      border-radius: 5px;
      margin-top: 15px;
      overflow: hidden;
    }
    #timer-fill {
      height: 100%;
      background: linear-gradient(90deg, #ef4444, #f59e0b);
      transition: width 0.1s;
    }
    #message {
      margin-top: 20px;
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      display: none;
    }
    .win { background: #10b981; }
    .lose { background: #ef4444; }
    button {
      margin-top: 15px;
      padding: 15px 40px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #8b5cf6;
      color: white;
      cursor: pointer;
    }
    button:hover { background: #a78bfa; }
  </style>
</head>
<body>
  <h1>🎯 Target Shooter</h1>
  <div class="stats">
    <div>Score: <span id="score">0</span></div>
    <div>Hits: <span id="hits">0</span></div>
    <div>Best: <span id="best">0</span></div>
  </div>
  
  <div id="arena"></div>
  <div id="timer-bar"><div id="timer-fill"></div></div>
  
  <div id="message"></div>
  <button id="startBtn" onclick="startGame()">▶️ Start</button>

  <script>
    const arena = document.getElementById('arena');
    const scoreEl = document.getElementById('score');
    const hitsEl = document.getElementById('hits');
    const bestEl = document.getElementById('best');
    const timerFill = document.getElementById('timer-fill');
    const message = document.getElementById('message');
    const startBtn = document.getElementById('startBtn');
    
    let score = 0;
    let hits = 0;
    let timeLeft = 30;
    let gameRunning = false;
    let spawnInterval;
    let timerInterval;
    let best = localStorage.getItem('targetBest') || 0;
    
    bestEl.textContent = best;
    timerFill.style.width = '100%';
    
    const targetTypes = [
      { emoji: '🎯', points: 10, size: 60, color: '#ef4444' },
      { emoji: '⭐', points: 25, size: 45, color: '#f59e0b' },
      { emoji: '💎', points: 50, size: 35, color: '#8b5cf6' },
      { emoji: '🌟', points: 100, size: 25, color: '#10b981' },
    ];
    
    function startGame() {
      score = 0;
      hits = 0;
      timeLeft = 30;
      gameRunning = true;
      scoreEl.textContent = '0';
      hitsEl.textContent = '0';
      message.style.display = 'none';
      startBtn.style.display = 'none';
      arena.innerHTML = '';
      timerFill.style.width = '100%';
      
      spawnTarget();
      spawnInterval = setInterval(spawnTarget, 1000);
      timerInterval = setInterval(updateTimer, 100);
    }
    
    function spawnTarget() {
      if (!gameRunning) return;
      
      const type = targetTypes[Math.floor(Math.random() * targetTypes.length)];
      const target = document.createElement('div');
      target.className = 'target';
      target.style.width = type.size + 'px';
      target.style.height = type.size + 'px';
      target.style.background = type.color;
      target.style.fontSize = (type.size * 0.6) + 'px';
      target.textContent = type.emoji;
      target.style.left = Math.random() * (350 - type.size) + 'px';
      target.style.top = Math.random() * (350 - type.size) + 'px';
      target.dataset.points = type.points;
      
      target.onclick = () => hitTarget(target);
      
      arena.appendChild(target);
      
      // Remove after 2 seconds if not hit
      setTimeout(() => {
        if (target.parentNode && !target.classList.contains('hit')) {
          target.remove();
        }
      }, 2000);
    }
    
    function hitTarget(target) {
      if (!gameRunning || target.classList.contains('hit')) return;
      
      target.classList.add('hit');
      const points = parseInt(target.dataset.points);
      score += points;
      hits++;
      scoreEl.textContent = score;
      hitsEl.textContent = hits;
      
      setTimeout(() => target.remove(), 300);
    }
    
    function updateTimer() {
      timeLeft -= 0.1;
      timerFill.style.width = (timeLeft / 30 * 100) + '%';
      
      if (timeLeft <= 0) {
        endGame();
      }
    }
    
    function endGame() {
      gameRunning = false;
      clearInterval(spawnInterval);
      clearInterval(timerInterval);
      
      if (score > best) {
        best = score;
        localStorage.setItem('targetBest', best);
        bestEl.textContent = best;
      }
      
      message.textContent = `${score >= 200 ? '🏆 Super!' : '⏱️ Zeit abgelaufen!'} Score: ${score} | +${Math.floor(score/10)} Coins`;
      message.className = score >= 200 ? 'win' : 'lose';
      message.style.display = 'block';
      startBtn.textContent = '🔄 Nochmal';
      startBtn.style.display = 'block';
    }
  </script>
</body>
</html>
