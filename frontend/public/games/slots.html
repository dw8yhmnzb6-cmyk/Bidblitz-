<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎰 Royal Slots - BidBlitz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    overflow: hidden;
}

.container {
    text-align: center;
    padding: 20px;
    max-width: 400px;
    width: 100%;
}

.logo {
    font-size: 36px;
    font-weight: 900;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 30px rgba(255,215,0,0.5);
    margin-bottom: 5px;
}

.subtitle {
    color: #b8a2d0;
    margin-bottom: 20px;
    font-size: 14px;
}

.balance-bar {
    display: flex;
    justify-content: space-between;
    background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,140,0,0.1));
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 15px;
    padding: 12px 20px;
    margin-bottom: 20px;
}

.balance-item {
    text-align: center;
}

.balance-value {
    font-size: 20px;
    font-weight: 900;
    color: #ffd700;
}

.balance-label {
    font-size: 10px;
    color: #b8a2d0;
    text-transform: uppercase;
}

.slot-machine {
    background: linear-gradient(180deg, #2a1a4a 0%, #1a0a2e 100%);
    border-radius: 30px;
    padding: 25px;
    border: 3px solid #ffd700;
    box-shadow: 0 0 50px rgba(255,215,0,0.3), inset 0 0 30px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
}

.slot-machine::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent 40%, rgba(255,215,0,0.1) 50%, transparent 60%);
    animation: shine 3s infinite;
}

@keyframes shine {
    0% { transform: translateX(-100%) rotate(45deg); }
    100% { transform: translateX(100%) rotate(45deg); }
}

.reels-container {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
}

.reel {
    width: 80px;
    height: 100px;
    background: linear-gradient(180deg, #0a0515 0%, #150a25 50%, #0a0515 100%);
    border-radius: 15px;
    border: 2px solid #3a2a5a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    overflow: hidden;
    box-shadow: inset 0 5px 15px rgba(0,0,0,0.8);
}

.reel.spinning .symbol {
    animation: spin 0.1s linear infinite;
}

@keyframes spin {
    0% { transform: translateY(-20px); }
    100% { transform: translateY(20px); }
}

.win-line {
    position: absolute;
    left: 10px;
    right: 10px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #ffd700, transparent);
    top: 50%;
    transform: translateY(-50%);
    opacity: 0;
    z-index: 2;
}

.win-line.show {
    opacity: 1;
    animation: pulse 0.5s ease infinite;
}

@keyframes pulse {
    0%, 100% { box-shadow: 0 0 10px #ffd700; }
    50% { box-shadow: 0 0 30px #ffd700, 0 0 50px #ffd700; }
}

.bet-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 15px;
    position: relative;
    z-index: 1;
}

.bet-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #ffd700;
    background: transparent;
    color: #ffd700;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
}

.bet-btn:hover {
    background: rgba(255,215,0,0.2);
    transform: scale(1.1);
}

.bet-display {
    background: rgba(0,0,0,0.5);
    padding: 10px 25px;
    border-radius: 25px;
    border: 1px solid #3a2a5a;
}

.bet-amount {
    font-size: 24px;
    font-weight: 900;
    color: #ffd700;
}

.spin-btn {
    width: 100%;
    padding: 18px;
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    border: none;
    border-radius: 20px;
    color: #1a0a2e;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s;
    position: relative;
    z-index: 1;
    box-shadow: 0 5px 30px rgba(255,215,0,0.5);
}

.spin-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 40px rgba(255,215,0,0.7);
}

.spin-btn:active {
    transform: translateY(0);
}

.spin-btn:disabled {
    background: #3a2a5a;
    color: #666;
    cursor: not-allowed;
    box-shadow: none;
}

.result-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    padding: 30px 50px;
    border-radius: 20px;
    z-index: 100;
    text-align: center;
    box-shadow: 0 0 100px rgba(255,215,0,0.8);
}

.result-popup.show {
    animation: popIn 0.5s ease forwards;
}

@keyframes popIn {
    0% { transform: translate(-50%, -50%) scale(0); }
    70% { transform: translate(-50%, -50%) scale(1.1); }
    100% { transform: translate(-50%, -50%) scale(1); }
}

.result-amount {
    font-size: 48px;
    font-weight: 900;
    color: #1a0a2e;
}

.result-label {
    font-size: 14px;
    color: #1a0a2e;
    opacity: 0.8;
}

.paytable {
    margin-top: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 15px;
    position: relative;
    z-index: 1;
}

.paytable-title {
    font-size: 14px;
    color: #ffd700;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.paytable-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
}

.paytable-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    font-size: 14px;
}

.paytable-symbols {
    font-size: 18px;
}

.paytable-mult {
    color: #ffd700;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="container">
    <div class="logo">🎰 Royal Slots</div>
    <p class="subtitle">Drehe & Gewinne!</p>
    
    <div class="balance-bar">
        <div class="balance-item">
            <div class="balance-value" id="balance">1000</div>
            <div class="balance-label">Guthaben</div>
        </div>
        <div class="balance-item">
            <div class="balance-value" id="totalWin">0</div>
            <div class="balance-label">Gewonnen</div>
        </div>
        <div class="balance-item">
            <div class="balance-value" id="spins">0</div>
            <div class="balance-label">Spins</div>
        </div>
    </div>
    
    <div class="slot-machine">
        <div class="reels-container">
            <div class="win-line" id="winLine"></div>
            <div class="reel" id="reel1"><span class="symbol">🍒</span></div>
            <div class="reel" id="reel2"><span class="symbol">🍋</span></div>
            <div class="reel" id="reel3"><span class="symbol">🍇</span></div>
        </div>
        
        <div class="bet-section">
            <button class="bet-btn" onclick="changeBet(-10)">−</button>
            <div class="bet-display">
                <div class="bet-amount" id="betAmount">10</div>
            </div>
            <button class="bet-btn" onclick="changeBet(10)">+</button>
        </div>
        
        <button class="spin-btn" id="spinBtn" onclick="spin()">
            🎰 SPIN
        </button>
    </div>
    
    <div class="paytable">
        <div class="paytable-title">💎 Gewinntabelle</div>
        <div class="paytable-grid">
            <div class="paytable-item">
                <span class="paytable-symbols">💎💎💎</span>
                <span class="paytable-mult">x100</span>
            </div>
            <div class="paytable-item">
                <span class="paytable-symbols">7️⃣7️⃣7️⃣</span>
                <span class="paytable-mult">x77</span>
            </div>
            <div class="paytable-item">
                <span class="paytable-symbols">🍒🍒🍒</span>
                <span class="paytable-mult">x50</span>
            </div>
            <div class="paytable-item">
                <span class="paytable-symbols">🍋🍋🍋</span>
                <span class="paytable-mult">x30</span>
            </div>
        </div>
    </div>
</div>

<div class="result-popup" id="resultPopup">
    <div class="result-label">GEWINN!</div>
    <div class="result-amount" id="resultAmount">+0</div>
</div>

<script>
const symbols = ['🍒', '🍋', '🍇', '🍊', '💎', '7️⃣', '⭐', '🔔'];
const multipliers = {
    '💎': 100,
    '7️⃣': 77,
    '🍒': 50,
    '⭐': 40,
    '🔔': 35,
    '🍋': 30,
    '🍇': 25,
    '🍊': 20
};

let balance = 1000;
let bet = 10;
let totalWin = 0;
let spins = 0;
let isSpinning = false;

const balanceEl = document.getElementById('balance');
const totalWinEl = document.getElementById('totalWin');
const spinsEl = document.getElementById('spins');
const betEl = document.getElementById('betAmount');
const spinBtn = document.getElementById('spinBtn');
const winLine = document.getElementById('winLine');
const resultPopup = document.getElementById('resultPopup');
const resultAmount = document.getElementById('resultAmount');

function changeBet(amount) {
    bet = Math.max(10, Math.min(100, bet + amount));
    betEl.textContent = bet;
}

function spin() {
    if (isSpinning || balance < bet) return;
    
    isSpinning = true;
    balance -= bet;
    spins++;
    balanceEl.textContent = balance;
    spinsEl.textContent = spins;
    spinBtn.disabled = true;
    winLine.classList.remove('show');
    
    const reels = [
        document.getElementById('reel1'),
        document.getElementById('reel2'),
        document.getElementById('reel3')
    ];
    
    reels.forEach(r => r.classList.add('spinning'));
    
    const results = [];
    
    reels.forEach((reel, i) => {
        const spins = 10 + i * 5;
        let count = 0;
        
        const interval = setInterval(() => {
            reel.querySelector('.symbol').textContent = symbols[Math.floor(Math.random() * symbols.length)];
            count++;
            
            if (count >= spins) {
                clearInterval(interval);
                reel.classList.remove('spinning');
                const finalSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                reel.querySelector('.symbol').textContent = finalSymbol;
                results.push(finalSymbol);
                
                if (results.length === 3) {
                    checkWin(results);
                }
            }
        }, 80);
    });
}

function checkWin(results) {
    const [a, b, c] = results;
    let win = 0;
    
    if (a === b && b === c) {
        win = bet * (multipliers[a] || 15);
        winLine.classList.add('show');
    } else if (a === b || b === c || a === c) {
        win = bet * 2;
    }
    
    if (win > 0) {
        balance += win;
        totalWin += win;
        balanceEl.textContent = balance;
        totalWinEl.textContent = totalWin;
        
        resultAmount.textContent = `+${win}`;
        resultPopup.classList.add('show');
        
        setTimeout(() => {
            resultPopup.classList.remove('show');
        }, 2000);
    }
    
    setTimeout(() => {
        isSpinning = false;
        spinBtn.disabled = balance < bet;
    }, 500);
}
</script>

</body>
</html>
