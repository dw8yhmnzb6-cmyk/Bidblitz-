<!DOCTYPE html>
<html>
<head>
<title>BidBlitz Puzzle</title>
<style>
body{margin:0;background:#1e1b4b;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:Arial;color:#fff}
#board{display:grid;grid-template-columns:repeat(3,80px);gap:5px}
.tile{width:80px;height:80px;background:#8b5cf6;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;border-radius:10px;cursor:pointer;transition:all 0.2s}
.tile:hover{background:#7c3aed}
.tile.empty{background:transparent}
#moves{margin:20px 0}
button{background:#22c55e;color:#fff;border:none;padding:10px 30px;border-radius:10px;cursor:pointer;margin-top:20px}
</style>
</head>
<body>
<h1>🧠 Puzzle</h1>
<div id="moves">Moves: 0</div>
<div id="board"></div>
<button onclick="init()">Neu starten</button>
<script>
let tiles=[1,2,3,4,5,6,7,8,0],moves=0
function init(){
tiles=[1,2,3,4,5,6,7,8,0]
for(let i=0;i<100;i++){
let empty=tiles.indexOf(0)
let neighbors=[]
if(empty%3>0)neighbors.push(empty-1)
if(empty%3<2)neighbors.push(empty+1)
if(empty>2)neighbors.push(empty-3)
if(empty<6)neighbors.push(empty+3)
let swap=neighbors[Math.floor(Math.random()*neighbors.length)]
tiles[empty]=tiles[swap]
tiles[swap]=0
}
moves=0
render()
}
function render(){
let board=document.getElementById("board")
board.innerHTML=""
tiles.forEach((t,i)=>{
let div=document.createElement("div")
div.className="tile"+(t===0?" empty":"")
div.innerText=t||""
div.onclick=()=>move(i)
board.appendChild(div)
})
document.getElementById("moves").innerText="Moves: "+moves
}
function move(i){
let empty=tiles.indexOf(0)
let diff=Math.abs(empty-i)
if(diff===1||diff===3){
tiles[empty]=tiles[i]
tiles[i]=0
moves++
render()
if(tiles.join("")==="123456780")alert("Gewonnen in "+moves+" Zügen!")
}
}
init()
</script>
</body>
</html>
